#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - make

runcmd:
  # Install Docker Engine
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Clone monitoring config
  - git clone --filter=blob:none --no-checkout https://github.com/szuryuu/monitoring-production-grade.git /tmp/repo
  - cd /tmp/repo && git sparse-checkout set monitoring && git checkout main
  - mv /tmp/repo/monitoring /home/adminuser/monitoring
  - rm -rf /tmp/repo

  # Ownership
  - usermod -aG docker adminuser
  - chown -R adminuser:adminuser /home/adminuser

  # Start
  - systemctl enable docker
  - systemctl start docker
  - cd /home/adminuser/monitoring && docker compose up -d
