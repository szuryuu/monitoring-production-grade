networks:
  monitoring:
    driver: bridge
  shared:
    external: true
    name: monitoring-incidentfox

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

  prometheus-watchdog:
    image: python:3.11-slim
    container_name: prometheus-watchdog
    working_dir: /app
    volumes:
      - ./webhook-bridge:/app
    command: >
      bash -c "pip install httpx -q && python watchdog.py"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - ALERTMANAGER_URL=http://alertmanager:9093
      - CHECK_INTERVAL=15
      - PYTHONUNBUFFERED=1
    networks:
      - monitoring
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    ports:
      - "8428:8428"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - monitoring
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

  webhook-bridge:
    image: python:3.11-slim
    container_name: alertmanager-webhook-bridge
    working_dir: /app
    volumes:
      - ./webhook-bridge:/app
    command: >
      bash -c "pip install fastapi uvicorn slack-sdk httpx -q && python webhook.py"
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - ALERT_SLACK_CHANNEL_ID=${ALERT_SLACK_CHANNEL_ID}
      - SLACK_BOT_USER_ID=${SLACK_BOT_USER_ID}
      - SLACK_ALERT_WEBHOOK_URL=${SLACK_ALERT_WEBHOOK_URL}
      - INCIDENTFOX_URL=http://incidentfox-sre-agent:8000
    env_file:
      - .env
    ports:
      - "9095:9095"
    networks:
      - monitoring
      - shared
    restart: unless-stopped

volumes:
  prometheus_data: {}
  grafana_data: {}
