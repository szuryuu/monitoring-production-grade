global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "incidentfox"

receivers:
  - name: "incidentfox"
    webhook_configs:
      - url: "http://alertmanager-webhook-bridge:9095/webhook"
        send_resolved: true
